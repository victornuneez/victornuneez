  <!-- CENTER TITLE -->
  <text class="title" x="268" y="82" text-anchor="middle">VICTOR NUNEZ</text>
  <text class="dim"   x="222" y="100" font-size="11">[ Backend Developer · Paraguay 🇵🇾 ]</text>

