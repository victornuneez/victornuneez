  <text class="dim d3"    x="110" y="114">1</text>

  <!-- col 3 x=160 -->
  <text class="dim d4"    x="160" y="25">0</text>
  <text class="bright d4" x="160" y="41">T</text>
  <text class="dim d4"    x="160" y="57">1</text>
  <text class="dim d4"    x="160" y="73">0</text>
  <text class="bright d4" x="160" y="89">O</text>
  <text class="dim d4"    x="160" y="105">1</text>

  <!-- col 4 x=210 -->
  <text class="dim d5"    x="210" y="20">1</text>
  <text class="bright d5" x="210" y="36">O</text>
  <text class="dim d5"    x="210" y="52">0</text>
