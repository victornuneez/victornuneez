  <text class="dim d10"    x="580" y="105">0</text>

  <!-- col 13 x=630 -->
  <text class="dim d11"    x="630" y="20">0</text>
  <text class="bright d11" x="630" y="36">V</text>
  <text class="dim d11"    x="630" y="52">1</text>
  <text class="dim d11"    x="630" y="68">0</text>
  <text class="bright d11" x="630" y="84">1</text>
  <text class="dim d11"    x="630" y="100">0</text>
