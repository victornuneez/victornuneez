  <!-- col 11 x=530 -->
  <text class="dim d9"    x="530" y="18">0</text>
  <text class="bright d9" x="530" y="34">P</text>
  <text class="dim d9"    x="530" y="50">1</text>
  <text class="dim d9"    x="530" y="66">0</text>
  <text class="bright d9" x="530" y="82">Y</text>
  <text class="dim d9"    x="530" y="98">1</text>
  <text class="dim d9"    x="530" y="114">0</text>

  <!-- col 12 x=580 -->
  <text class="dim d10"    x="580" y="25">1</text>
  <text class="bright d10" x="580" y="41">D</text>
  <text class="dim d10"    x="580" y="57">0</text>
  <text class="dim d10"    x="580" y="73">1</text>
