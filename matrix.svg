<svg xmlns="http://www.w3.org/2000/svg" width="700" height="150" viewBox="0 0 700 150">
  <rect width="700" height="150" fill="#0D1117"/>
  <style>
    text { font-family: 'Courier New', monospace; font-size: 14px; fill: #00FF41; }
    .dim { fill: #005500; }
    .bright { fill: #AAFFAA; }

    @keyframes drop { 0%{opacity:0} 5%{opacity:1} 85%{opacity:1} 100%{opacity:0} }
    @keyframes pulse { 0%,100%{opacity:1;fill:#FFFFFF} 50%{opacity:0.4;fill:#00FF41} }

    .d1  { animation: drop 2.0s ease-in-out infinite 0.0s; }
    .d2  { animation: drop 2.3s ease-in-out infinite 0.4s; }
    .d3  { animation: drop 1.8s ease-in-out infinite 0.8s; }
    .d4  { animation: drop 2.5s ease-in-out infinite 0.2s; }
    .d5  { animation: drop 2.1s ease-in-out infinite 1.0s; }
    .d6  { animation: drop 1.9s ease-in-out infinite 0.6s; }
    .d7  { animation: drop 2.4s ease-in-out infinite 0.3s; }
    .d8  { animation: drop 2.2s ease-in-out infinite 0.9s; }
    .d9  { animation: drop 1.7s ease-in-out infinite 1.2s; }
    .d10 { animation: drop 2.6s ease-in-out infinite 0.5s; }
    .d11 { animation: drop 2.0s ease-in-out infinite 1.4s; }
    .d12 { animation: drop 2.3s ease-in-out infinite 0.7s; }
    .d13 { animation: drop 1.9s ease-in-out infinite 1.6s; }
    .d14 { animation: drop 2.1s ease-in-out infinite 0.1s; }
    .title { animation: pulse 1.5s ease-in-out infinite; font-size: 22px; font-weight: bold; }
  </style>

  <!-- col 0 x=10 -->
  <text class="dim d1"    x="10" y="20">1</text>
  <text class="bright d1" x="10" y="36">V</text>
  <text class="dim d1"    x="10" y="52">0</text>
  <text class="dim d1"    x="10" y="68">1</text>
  <text class="dim d1"    x="10" y="84">0</text>
  <text class="bright d1" x="10" y="100">1</text>
  <text class="dim d1"    x="10" y="116">0</text>

  <!-- col 1 x=60 -->
  <text class="dim d2"    x="60" y="30">0</text>
  <text class="bright d2" x="60" y="46">I</text>
  <text class="dim d2"    x="60" y="62">1</text>
  <text class="dim d2"    x="60" y="78">0</text>
  <text class="bright d2" x="60" y="94">C</text>
  <text class="dim d2"    x="60" y="110">1</text>

  <!-- col 2 x=110 -->
  <text class="dim d3"    x="110" y="18">1</text>
  <text class="bright d3" x="110" y="34">C</text>
